name: Telegram Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # يعيد التشغيل كل 6 ساعات تلقائياً
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: database.json
          key: bot-database-${{ github.run_id }}
          restore-keys: |
            bot-database-

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py

      - name: Save database
        if: always()
        uses: actions/cache@v4
        with:
          path: database.json
          key: bot-database-${{ github.run_id }}
