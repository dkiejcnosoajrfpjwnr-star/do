name: Keep Bot Alive

on:
  schedule:
    # يشغّل workflow_dispatch كل 5 ساعات و50 دقيقة لضمان الاستمرارية
    - cron: "50 */5 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bot workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'bot.yml',
              ref: 'main'
            });
            console.log('✅ Bot workflow triggered successfully');
